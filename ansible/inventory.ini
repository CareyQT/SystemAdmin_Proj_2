# Dynamic inventory — the IP is filled in by run.sh from Terraform output.
# You can also use this file manually by replacing the placeholder:
#   ansible-playbook -i "1.2.3.4," playbook.yml
[minecraft]
{{ server_ip }}

[minecraft:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/minecraft_key
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
